name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Validate required secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "$CLOUDFLARE_PROJECT_NAME" || (echo "Missing CLOUDFLARE_PROJECT_NAME" && exit 1)

      - name: Validate Cloudflare runtime secrets
        run: |
          set -euo pipefail

          npx wrangler pages secret list --project-name="$CLOUDFLARE_PROJECT_NAME" > /tmp/rolelens-pages-secrets.txt
          grep -q "AUTH_PASSWORD_PEPPER" /tmp/rolelens-pages-secrets.txt || (
            echo "Missing Cloudflare Pages secret: AUTH_PASSWORD_PEPPER"
            echo "Set it with: npx wrangler pages secret put AUTH_PASSWORD_PEPPER --project-name=$CLOUDFLARE_PROJECT_NAME"
            exit 1
          )

      - name: Sync Pages deployment config
        run: |
          set -euo pipefail

          D1_DATABASE_ID=$(awk -F'"' '/^database_id = "/ { print $2; exit }' wrangler.toml)
          test -n "$D1_DATABASE_ID" || (echo "Missing database_id in wrangler.toml" && exit 1)

          CURRENT_PROJECT=$(curl --silent --show-error --fail \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CLOUDFLARE_PROJECT_NAME" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")

          PAYLOAD=$(echo "$CURRENT_PROJECT" | jq --compact-output --arg d1_database_id "$D1_DATABASE_ID" '
            def as_object:
              if type == "object" then . else {} end;

            def merge_env:
              . as $env
              | ($env | as_object) as $base
              | $base
              + {
                  d1_databases: (((($base.d1_databases // {}) | as_object) + { DB: { id: $d1_database_id } }))
                };

            {
              production_branch: "main",
              deployment_configs: {
                production: ((.result.deployment_configs.production // {}) | merge_env),
                preview: ((.result.deployment_configs.preview // {}) | merge_env)
              }
            }
          ')

          PATCH_RESULT=$(curl --silent --show-error --fail -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CLOUDFLARE_PROJECT_NAME" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD")

          echo "$PATCH_RESULT" | jq --exit-status '.success == true' >/dev/null

          VERIFIED_PROJECT=$(curl --silent --show-error --fail \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CLOUDFLARE_PROJECT_NAME" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")

          echo "$VERIFIED_PROJECT" | jq --compact-output '{
            production_branch: .result.production_branch,
            production: {
              d1_databases: (.result.deployment_configs.production.d1_databases // {})
            },
            preview: {
              d1_databases: (.result.deployment_configs.preview.d1_databases // {})
            }
          }'

      - name: Build Pages output
        run: npm run pages:build

      - name: Apply D1 migrations
        run: npm run db:schema:prod

      - name: Deploy to Cloudflare Pages
        run: npm run pages:deploy -- --project-name="$CLOUDFLARE_PROJECT_NAME" --branch=main

      - name: Verify deployed auth runtime
        run: |
          set -euo pipefail

          RESPONSE=$(curl --silent --show-error --write-out "\n%{http_code}" \
            "https://$CLOUDFLARE_PROJECT_NAME.pages.dev/api/auth/reset-password/" \
            -H "content-type: application/json" \
            --data '{"email":"auth-runtime-check@example.com","password":"runtime-check-password"}')
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          test "$STATUS" = "200" || (
            echo "Auth runtime check failed with status $STATUS"
            echo "$BODY"
            exit 1
          )
          echo "$BODY" | jq --exit-status '.ok == true' >/dev/null
