name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Validate required secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "$CLOUDFLARE_PROJECT_NAME" || (echo "Missing CLOUDFLARE_PROJECT_NAME" && exit 1)

      - name: Sync Pages deployment config
        run: |
          set -euo pipefail

          D1_DATABASE_ID=$(awk -F'"' '/^database_id = "/ { print $2; exit }' wrangler.toml)
          test -n "$D1_DATABASE_ID" || (echo "Missing database_id in wrangler.toml" && exit 1)

          CURRENT_PROJECT=$(curl --silent --show-error --fail \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CLOUDFLARE_PROJECT_NAME" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")

          PAYLOAD=$(echo "$CURRENT_PROJECT" | jq --compact-output --arg d1_database_id "$D1_DATABASE_ID" '
            def required_vars:
              {
                PERSISTENCE_BACKEND: { type: "plain_text", value: "d1" },
                AUTH_BACKEND: { type: "plain_text", value: "d1" },
                PERSISTENCE_D1_BINDING: { type: "plain_text", value: "DB" }
              };

            def merge_env:
              . as $env
              | $env
              + {
                  d1_databases: (
                    (((($env.d1_databases // []) | if type == "array" then . else [] end)
                      | map(select(.binding != "DB")))
                    + [{ binding: "DB", database_id: $d1_database_id }])
                  ),
                  env_vars: (
                    ((($env.env_vars // {}) | if type == "object" then . else {} end)
                      + required_vars)
                  )
                };

            {
              deployment_configs: {
                production: ((.result.deployment_configs.production // {}) | merge_env),
                preview: ((.result.deployment_configs.preview // {}) | merge_env)
              }
            }
          ')

          PATCH_RESULT=$(curl --silent --show-error --fail -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CLOUDFLARE_PROJECT_NAME" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD")

          echo "$PATCH_RESULT" | jq --exit-status '.success == true' >/dev/null

      - name: Build Pages output
        run: npm run cf:build

      - name: Apply D1 migrations
        run: npm run d1:migrate:prod

      - name: Deploy to Cloudflare Pages
        run: npm run cf:deploy -- --branch=main
