name: Python Scrape Now

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      source_urls:
        description: "Optional comma/newline separated URLs (merged with sources file)"
        required: false
        default: ""
        type: string
      sources_file:
        description: "JSON source catalog path ({name,url,company?,source_type?})"
        required: false
        default: "python/scraper/sources.sites.json"
        type: string
      timeout_seconds:
        description: "HTTP timeout per source (seconds)"
        required: false
        default: "20"
        type: string
      limit_per_source:
        description: "Max links kept per source"
        required: false
        default: "120"
        type: string
      platform:
        description: "all | indeed | linkedin | saramin | jobkorea"
        required: false
        default: "all"
        type: choice
        options:
          - "all"
          - "indeed"
          - "linkedin"
          - "saramin"
          - "jobkorea"
permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
      SCRAPER_SOURCE_URLS: ${{ github.event.inputs.source_urls || '' }}
      SCRAPER_SOURCES_FILE: ${{ github.event.inputs.sources_file || 'python/scraper/sources.sites.json' }}
      SCRAPER_OUTPUT_PATH: ${{ runner.temp }}/python-scraped-jobs.json
      SCRAPER_TIMEOUT_SECONDS: ${{ github.event.inputs.timeout_seconds || '20' }}
      SCRAPER_LIMIT_PER_SOURCE: ${{ github.event.inputs.limit_per_source || '120' }}
      SCRAPER_PLATFORM: ${{ github.event.inputs.platform || 'all' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper dependencies
        run: |
          python3 -m pip install -r python/scraper/requirements.txt

      - name: Run scraper
        run: |
          python3 python/scraper/scrape_jobs.py \
            --sources-file "$SCRAPER_SOURCES_FILE" \
            --source-urls "$SCRAPER_SOURCE_URLS" \
            --timeout "$SCRAPER_TIMEOUT_SECONDS" \
            --limit-per-source "$SCRAPER_LIMIT_PER_SOURCE" \
            --platform "$SCRAPER_PLATFORM" \
            --output "$SCRAPER_OUTPUT_PATH"

      - name: Upload scraped JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-scraped-jobs
          path: ${{ env.SCRAPER_OUTPUT_PATH }}

      - name: Ingest scraped output into D1
        run: |
          set -euo pipefail

          if [ -z "$ROLELENS_CRON_SECRET" ]; then
            echo "Missing ROLELENS_CRON_SECRET; cannot ingest scraped output into D1."
            exit 1
          fi

          curl --location --fail --silent --show-error \
            --request POST \
            --header "content-type: application/json" \
            --header "x-cron-secret: $ROLELENS_CRON_SECRET" \
            --data-binary "@$SCRAPER_OUTPUT_PATH" \
            "$ROLELENS_SYNC_URL/api/jobs/ingest"
        env:
          ROLELENS_CRON_SECRET: ${{ secrets.ROLELENS_CRON_SECRET }}
          ROLELENS_SYNC_URL: ${{ secrets.ROLELENS_SYNC_URL || 'https://rolelens.pages.dev' }}
