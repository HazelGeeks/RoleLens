name: Python Scrape Now

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      source_urls:
        description: "Optional comma/newline separated URLs (merged with sources file)"
        required: false
        default: ""
        type: string
      sources_file:
        description: "JSON source catalog path ({name,url,company?,source_type?})"
        required: false
        default: "python/scraper/sources.sites.json"
        type: string
      output_path:
        description: "Repository path for scraped JSON output"
        required: false
        default: "data/scraped/python-scraped-jobs.json"
        type: string
      timeout_seconds:
        description: "HTTP timeout per source (seconds)"
        required: false
        default: "20"
        type: string
      limit_per_source:
        description: "Max links kept per source"
        required: false
        default: "120"
        type: string
      platform:
        description: "all | indeed | linkedin | saramin | jobkorea"
        required: false
        default: "all"
        type: choice
        options:
          - "all"
          - "indeed"
          - "linkedin"
          - "saramin"
          - "jobkorea"
      commit_changes:
        description: "Commit updated JSON back to repository"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SCRAPER_SOURCE_URLS: ${{ github.event.inputs.source_urls || '' }}
      SCRAPER_SOURCES_FILE: ${{ github.event.inputs.sources_file || 'python/scraper/sources.sites.json' }}
      SCRAPER_OUTPUT_PATH: ${{ github.event.inputs.output_path || 'data/scraped/python-scraped-jobs.json' }}
      SCRAPER_TIMEOUT_SECONDS: ${{ github.event.inputs.timeout_seconds || '20' }}
      SCRAPER_LIMIT_PER_SOURCE: ${{ github.event.inputs.limit_per_source || '120' }}
      SCRAPER_PLATFORM: ${{ github.event.inputs.platform || 'all' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper dependencies
        run: |
          python3 -m pip install -r python/scraper/requirements.txt

      - name: Run scraper
        run: |
          python3 python/scraper/scrape_jobs.py \
            --sources-file "$SCRAPER_SOURCES_FILE" \
            --source-urls "$SCRAPER_SOURCE_URLS" \
            --timeout "$SCRAPER_TIMEOUT_SECONDS" \
            --limit-per-source "$SCRAPER_LIMIT_PER_SOURCE" \
            --platform "$SCRAPER_PLATFORM" \
            --output "$SCRAPER_OUTPUT_PATH"

      - name: Upload scraped JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-scraped-jobs
          path: ${{ env.SCRAPER_OUTPUT_PATH }}

      - name: Commit scraped output
        if: ${{ github.event_name == 'schedule' || github.event.inputs.commit_changes == 'true' }}
        run: |
          if git diff --quiet -- "$SCRAPER_OUTPUT_PATH"; then
            echo "No output changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$SCRAPER_OUTPUT_PATH"
          git commit -m "chore: refresh python scraped jobs snapshot"
          git push
