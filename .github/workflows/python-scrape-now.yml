name: Python Scrape Now

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      source_urls:
        description: "Optional comma/newline separated URLs (merged with sources file)"
        required: false
        default: ""
        type: string
      sources_file:
        description: "JSON source catalog path ({name,url,company?,source_type?})"
        required: false
        default: "python/scraper/sources.sites.json"
        type: string
      output_path:
        description: "Repository path for scraped JSON output"
        required: false
        default: "data/scraped/python-scraped-jobs.json"
        type: string
      timeout_seconds:
        description: "HTTP timeout per source (seconds)"
        required: false
        default: "20"
        type: string
      limit_per_source:
        description: "Max links kept per source"
        required: false
        default: "120"
        type: string
      platform:
        description: "all | indeed | linkedin | saramin | jobkorea"
        required: false
        default: "all"
        type: choice
        options:
          - "all"
          - "indeed"
          - "linkedin"
          - "saramin"
          - "jobkorea"
      commit_changes:
        description: "Commit updated JSON back to repository"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
      SCRAPER_SOURCE_URLS: ${{ github.event.inputs.source_urls || '' }}
      SCRAPER_SOURCES_FILE: ${{ github.event.inputs.sources_file || 'python/scraper/sources.sites.json' }}
      SCRAPER_OUTPUT_PATH: ${{ github.event.inputs.output_path || 'data/scraped/python-scraped-jobs.json' }}
      SCRAPER_TIMEOUT_SECONDS: ${{ github.event.inputs.timeout_seconds || '20' }}
      SCRAPER_LIMIT_PER_SOURCE: ${{ github.event.inputs.limit_per_source || '120' }}
      SCRAPER_PLATFORM: ${{ github.event.inputs.platform || 'all' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper dependencies
        run: |
          python3 -m pip install -r python/scraper/requirements.txt

      - name: Run scraper
        run: |
          python3 python/scraper/scrape_jobs.py \
            --sources-file "$SCRAPER_SOURCES_FILE" \
            --source-urls "$SCRAPER_SOURCE_URLS" \
            --timeout "$SCRAPER_TIMEOUT_SECONDS" \
            --limit-per-source "$SCRAPER_LIMIT_PER_SOURCE" \
            --platform "$SCRAPER_PLATFORM" \
            --output "$SCRAPER_OUTPUT_PATH"

      - name: Upload scraped JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-scraped-jobs
          path: ${{ env.SCRAPER_OUTPUT_PATH }}

      - name: Ingest scraped output into D1
        run: |
          set -euo pipefail

          if [ -z "$ROLELENS_CRON_SECRET" ]; then
            echo "Missing ROLELENS_CRON_SECRET; cannot ingest scraped output into D1."
            exit 1
          fi

          curl --fail --silent --show-error \
            --request POST \
            --header "content-type: application/json" \
            --header "x-cron-secret: $ROLELENS_CRON_SECRET" \
            --data-binary "@$SCRAPER_OUTPUT_PATH" \
            "$ROLELENS_SYNC_URL/api/jobs/ingest"
        env:
          ROLELENS_CRON_SECRET: ${{ secrets.ROLELENS_CRON_SECRET }}
          ROLELENS_SYNC_URL: ${{ secrets.ROLELENS_SYNC_URL || 'https://rolelens.pages.dev' }}

      - name: Commit scraped output
        id: commit-output
        if: ${{ github.event.inputs.commit_changes == 'true' }}
        run: |
          if git diff --quiet -- "$SCRAPER_OUTPUT_PATH"; then
            echo "No output changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$SCRAPER_OUTPUT_PATH"
          git commit -m "chore: refresh python scraped jobs snapshot"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Setup Node for post-scrape deploy
        if: ${{ steps.commit-output.outputs.committed == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install app dependencies for post-scrape deploy
        if: ${{ steps.commit-output.outputs.committed == 'true' }}
        run: npm ci

      - name: Validate Cloudflare deploy secrets
        if: ${{ steps.commit-output.outputs.committed == 'true' }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "$CLOUDFLARE_PROJECT_NAME" || (echo "Missing CLOUDFLARE_PROJECT_NAME" && exit 1)

      - name: Validate Cloudflare runtime secrets
        if: ${{ steps.commit-output.outputs.committed == 'true' }}
        run: |
          set -euo pipefail

          npx wrangler pages secret list --project-name="$CLOUDFLARE_PROJECT_NAME" > /tmp/rolelens-pages-secrets.txt
          grep -q "AUTH_PASSWORD_PEPPER" /tmp/rolelens-pages-secrets.txt || (
            echo "Missing Cloudflare Pages secret: AUTH_PASSWORD_PEPPER"
            echo "Set it with: npx wrangler pages secret put AUTH_PASSWORD_PEPPER --project-name=$CLOUDFLARE_PROJECT_NAME"
            exit 1
          )

      - name: Build Pages output after scraper commit
        if: ${{ steps.commit-output.outputs.committed == 'true' }}
        run: npm run pages:build

      - name: Deploy Pages output after scraper commit
        if: ${{ steps.commit-output.outputs.committed == 'true' }}
        run: npm run pages:deploy -- --project-name="$CLOUDFLARE_PROJECT_NAME" --branch=main

      - name: Verify deployed auth runtime
        if: ${{ steps.commit-output.outputs.committed == 'true' }}
        run: |
          set -euo pipefail

          RESPONSE=$(curl --silent --show-error --write-out "\n%{http_code}" \
            "https://$CLOUDFLARE_PROJECT_NAME.pages.dev/api/auth/reset-password/" \
            -H "content-type: application/json" \
            --data '{"email":"auth-runtime-check@example.com","password":"runtime-check-password"}')
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          test "$STATUS" = "200" || (
            echo "Auth runtime check failed with status $STATUS"
            echo "$BODY"
            exit 1
          )
          echo "$BODY" | jq --exit-status '.ok == true' >/dev/null
